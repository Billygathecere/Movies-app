<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Metadata for the browser -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone - Beginner</title>

    <!-- Link to our CSS file for styling -->
    <link rel="stylesheet" href="home.css">

    <!-- Importing a modern font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>

    <!-- The Navigation/Header section -->
    <header id="main-header">
        <div class="logo" id="site-logo">NETFLIX</div>
        <nav class="nav-links">
            <a href="home.html" class="nav-item active" id="nav-home">Home</a>
            <a href="mylist.html" class="nav-item" id="nav-mylist">My List</a>
        </nav>
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Search for a movie...">
            <button id="search-button">Search</button>
        </div>
    </header>

    <!-- The main layout area for movies -->
    <main class="movie-container" id="movie-grid">
        <!-- Movies will be loaded here dynamically from home.js -->
    </main>


    <!-- Connect our JavaScript file -->
    <script src="home.js"></script>
</body>

</html>
